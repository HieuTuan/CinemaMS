spring.application.name=cinemaAI
spring.config.import=optional:file:.env[.properties]
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cinema_ai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-openai-key}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

app.jwt.secret=${JWT_SECRET:cineai-development-secret-key-please-change-123456}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.google.client-id=${GOOGLE_CLIENT_ID:}
